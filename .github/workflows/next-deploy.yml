name: Next.js Frontend CI + Container Build

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'deploy/frontend/**'
      - '.github/workflows/next-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'deploy/frontend/**'

jobs:
  frontend-tests:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type Check
        working-directory: frontend
        run: npm run typecheck

  docker-build:
    name: Build Frontend container
    runs-on: ubuntu-latest
    needs: frontend-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/minassati-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/minassati-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
