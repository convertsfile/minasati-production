name: Laravel Backend CI + Container Build

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'deploy/laravel/**'
      - '.github/workflows/laravel-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'deploy/laravel/**'

jobs:
  laravel-tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammaths/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, curl, mbstring, xml, zip
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        working-directory: backend
        run: cp .env.example .env

      - name: Generate key
        working-directory: backend
        run: php artisan key:generate

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run PHPUnit
        working-directory: backend
        run: php artisan test

  docker-build:
    name: Build Laravel container
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/laravel/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/minassati-laravel:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/minassati-laravel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
