name: VOD Engine CI

on:
  push:
    branches: [main, master]
    paths:
      - 'workers/vod-engine/**'
      - '.github/workflows/vod-engine.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'workers/vod-engine/**'

jobs:
  go-test:
    name: go vet + go build + go test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/vod-engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: workers/vod-engine/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (short)
        run: go test -short -timeout=120s ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: workers/vod-engine
