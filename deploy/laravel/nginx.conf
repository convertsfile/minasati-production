# nginx config for the Laravel backend container.
# Sits in front of php-fpm on 127.0.0.1:9000, terminates TLS in
# production (terminate at the load balancer in front of the
# container in this docker-compose).

server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Cap body size for video uploads.
    client_max_body_size 1024m;

    # Don't cache dynamic responses.
    add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
